<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous Numismatic Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0b0f17; color: #f0f4f8; }</style>
</head>
<body class="p-4 max-w-md mx-auto font-sans antialiased">

    <div class="text-center my-6 border-b border-gray-900 pb-4">
        <h1 class="text-3xl font-extrabold tracking-tight text-white">WhatCoin™</h1>
        <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-semibold">Autonomous AI Intelligence Suite v2.2</p>
    </div>

    <!-- API Credentials Container -->
    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-amber-500/20 shadow-lg">
        <label class="block text-xs font-bold uppercase tracking-wider text-amber-400 mb-2">Gemini API Credentials</label>
        <input 
            id="api-key-input" 
            type="password" 
            placeholder="Enter API Key..." 
            class="w-full bg-[#182032] rounded-lg p-3 text-xs text-white placeholder-gray-500 border border-[#2e3b54] focus:outline-none focus:border-amber-500 transition-all font-mono"
        >
    </div>

    <!-- Structured Parameter Controls -->
    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-[#222c3f] shadow-2xl space-y-3">
        
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Denomination</label>
            <select id="denom-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                <option value="1c">Cent (Penny)</option>
                <option value="5c">Nickel</option>
                <option value="10c">Dime</option>
                <option value="25c">Quarter</option>
                <option value="50c">Half Dollar</option>
                <option value="11">Dollar Coin</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Year</label>
                <select id="year-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Mint Mark</label>
                <select id="mint-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                    <option value="P (Philadelphia)">P (Philadelphia)</option>
                    <option value="D (Denver)">D (Denver)</option>
                    <option value="S (San Francisco)">S (San Francisco)</option>
                    <option value="W (West Point)">W (West Point)</option>
                    <option value="No Mint Mark">No Mint Mark</option>
                </select>
            </div>
        </div>

        <!-- Grade Selection Control -->
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400">Grade Scale Evaluation</label>
                <span id="grade-badge" class="text-xs bg-blue-900/40 text-blue-400 px-2 py-0.5 rounded border border-blue-500/30 font-bold">20 - Fine (F)</span>
            </div>
            <input 
                id="grade-slider" 
                type="range" 
                min="1" 
                max="70" 
                value="20" 
                class="w-full h-2 bg-[#182032] rounded-lg appearance-none cursor-pointer accent-blue-500 border border-[#2e3b54]"
                oninput="updateGradeLabel(this.value)"
            >
            <div class="flex justify-between text-[10px] text-gray-500 mt-1">
                <span>PO-1 (Poor)</span>
                <span>MS-70 (Uncirculated)</span>
            </div>
        </div>

        <!-- Action Matrix -->
        <div class="grid grid-cols-5 gap-2 pt-2">
            <button id="multiplier-btn" onclick="fetchMultipliers()" class="col-span-2 bg-[#1b253b] hover:bg-[#23304d] text-amber-400 border border-amber-500/30 font-bold py-3 rounded-lg text-xs uppercase tracking-wider transition-colors">
                Multipliers
            </button>
            <button id="search-btn" onclick="executeSearch()" class="col-span-3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-xs uppercase tracking-wider transition-colors">
                Query Live AI
            </button>
        </div>
    </div>

    <!-- Status & Error Output Panel -->
    <div id="status-card" class="bg-[#221616] rounded-xl p-4 mb-4 border border-red-500/30 hidden">
        <p id="status-content" class="text-xs text-red-400 font-medium font-mono whitespace-pre-wrap"></p>
    </div>

    <!-- Defect Multiplier Diagnostic Output -->
    <div id="multiplier-card" class="bg-[#111622] rounded-xl p-4 mb-4 border border-amber-500/20 shadow-lg hidden">
        <h4 class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-2">Target Defect Anomalies & Varieties</h4>
        <p id="multiplier-content" class="text-xs text-gray-300 leading-relaxed whitespace-pre-line"></p>
    </div>

    <!-- Metric Display Panels -->
    <div id="target-specimen-card" class="bg-[#111622] rounded-xl p-4 mb-4 border border-blue-500/20 shadow-lg hidden space-y-2">
        <div>
            <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Coin Specification</label>
            <h3 id="target-coin-name" class="text-base font-bold text-white">---</h3>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-1 border-t border-gray-800">
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Mintage Location</label>
                <div id="display-location" class="text-xs font-semibold text-blue-400">---</div>
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Total Mintage</label>
                <div id="display-mintage" class="text-xs font-semibold text-blue-400">---</div>
            </div>
        </div>
    </div>

    <div class="bg-[#152035] rounded-xl p-5 mb-4 border border-blue-400 text-center shadow-inner">
        <div id="display-value" class="text-5xl font-black text-white">$0.00</div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>
    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        window.GoogleGenAIInstance = GoogleGenAI;
    </script>

    <script>
        let activeSearchId = 0;
        let activeMultiplierId = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const yearSelect = document.getElementById('year-select');
            let optionsStr = '';
            for(let y = 2026; y >= 1800; y--) {
                optionsStr += `<option value="${y}">${y}</option>`;
            }
            yearSelect.innerHTML = optionsStr;
            yearSelect.value = "1976";
        });

        function updateGradeLabel(val) {
            const badge = document.getElementById('grade-badge');
            const num = parseInt(val);
            let label = "Circulated";
            
            if (num >= 60) label = `MS-${num} (Uncirculated)`;
            else if (num >= 50) label = `AU-${num} (About Uncirculated)`;
            else if (num >= 40) label = `EF-${num} (Extremely Fine)`;
            else if (num >= 20) label = `VF-${num} (Very Fine)`;
            else if (num >= 12) label = `F-${num} (Fine)`;
            else if (num >= 4) label = `G-${num} (Good)`;
            else label = `PO-${num} (Poor)`;
            
            badge.innerText = label;
        }

        function getCompiledSelection() {
            return {
                denomination: document.getElementById('denom-select').options[document.getElementById('denom-select').selectedIndex].text,
                year: document.getElementById('year-select').value,
                mint: document.getElementById('mint-select').value,
                grade: document.getElementById('grade-slider').value
            };
        }

        // Updated error diagnostic view
        function showError(msg) {
            const card = document.getElementById('status-card');
            const content = document.getElementById('status-content');
            if (msg) {
                content.innerText = msg;
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        }

        async function fetchMultipliers() {
            showError(null);
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) { showError("Error: Please enter your Gemini API key first."); return; }

            activeMultiplierId++;
            const currentId = activeMultiplierId;

            const config = getCompiledSelection();
            const multiplierBtn = document.getElementById('multiplier-btn');
            const targetDisplay = document.getElementById('multiplier-card');
            const targetText = document.getElementById('multiplier-content');

            multiplierBtn.disabled = true;
            multiplierBtn.innerText = "...";
            targetDisplay.classList.remove('hidden');
            targetText.innerText = "Querying varieties database...";

            try {
                const ai = new window.GoogleGenAIInstance({ apiKey: apiKey });
                const response = await ai.models.generateContent({
                    model: "gemini-2.5-flash",
                    contents: `Identify well-known varieties, errors, and key defect multipliers for a ${config.year} ${config.mint} ${config.denomination}. Provide a clean bulleted list.`
                });
                
                if (currentId !== activeMultiplierId) return;
                targetText.innerText = response.text;
            } catch (error) {
                console.error(error);
                if (currentId === activeMultiplierId) {
                    showError(`API Error: ${error.message || error}`);
                }
            } finally {
                if (currentId === activeMultiplierId) {
                    multiplierBtn.disabled = false;
                    multiplierBtn.innerText = "Multipliers";
                }
            }
        }

        async function executeSearch() {
            showError(null);
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) { showError("Error: Please enter your Gemini API key first."); return; }

            activeSearchId++;
            const currentId = activeSearchId;

            const config = getCompiledSelection();
            const searchBtn = document.getElementById('search-btn');
            searchBtn.disabled = true;
            searchBtn.innerText = "Analyzing...";

            try {
                const ai = new window.GoogleGenAIInstance({ apiKey: apiKey });

                let sheldonNotation = `Grade ${config.grade}/70`;
                const numGrade = parseInt(config.grade);
                if (numGrade >= 60) sheldonNotation = `Mint State Uncirculated MS-${numGrade}`;
                else if (numGrade >= 50) sheldonNotation = `About Uncirculated AU-${numGrade}`;
                else if (numGrade >= 40) sheldonNotation = `Extremely Fine EF-${numGrade}`;
                else if (numGrade >= 20) sheldonNotation = `Very Fine VF-${numGrade}`;

                // Leverage strict schema configuration to guarantee structured data
                const response = await ai.models.generateContent({
                    model: "gemini-2.5-flash",
                    contents: `Analyze standard market transaction values for this coin setup: Denomination: ${config.denomination}, Year: ${config.year}, Mint Mark: ${config.mint}, Condition: ${sheldonNotation}.`,
                    config: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                name: { type: "STRING" },
                                price: { type: "NUMBER" },
                                mintage_location: { type: "STRING" },
                                mintage_count: { type: "STRING" }
                            },
                            required: ["name", "price", "mintage_location", "mintage_count"]
                        }
                    }
                });

                if (currentId !== activeSearchId) return;

                const data = JSON.parse(response.text.trim());
                
                document.getElementById('target-coin-name').innerText = data.name;
                document.getElementById('display-location').innerText = data.mintage_location || "Unknown";
                document.getElementById('display-mintage').innerText = data.mintage_count || "Unknown";
                
                const finalPrice = typeof data.price === 'number' ? data.price : parseFloat(data.price) || 0.00;
                document.getElementById('display-value').innerText = `$${finalPrice.toFixed(2)}`;
                
                document.getElementById('target-specimen-card').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                if (currentId === activeSearchId) {
                    showError(`Engine Error: ${error.message || error}`);
                }
            } finally {
                if (currentId === activeSearchId) {
                    searchBtn.disabled = false;
                    searchBtn.innerText = "Query Live AI";
                }
            }
        }
    </script>
</body>
</html>
