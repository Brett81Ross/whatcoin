<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Intelligence Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f17; color: #e2e8f0; }
        .glass { background-color: #111622; border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto font-sans">

    <!-- Logo Section -->
    <div class="text-center mb-6">
        <img src="logo5.png" alt="Logo" class="w-20 h-20 mx-auto mb-2 rounded-full">
        <h1 class="text-2xl font-black text-white">WhatCoin™</h1>
    </div>

    <div class="glass p-4 rounded-xl space-y-4">
        <!-- Year -->
        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Year</label>
            <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                <option>1960</option>
            </select>
        </div>

        <!-- Denomination -->
        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Denomination</label>
            <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                <option>Cent (Penny)</option>
                <option>Nickel</option>
                <option>Dime</option>
                <option>Quarter</option>
                <option>Half Dollar</option>
            </select>
        </div>

        <!-- Tone (Aging) -->
        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Tone (Aging)</label>
            <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                <option>None/Natural</option>
                <option>Light Toning</option>
                <option>Target/Bullseye</option>
                <option>Rainbow</option>
                <option>Artificial/Damaged</option>
            </select>
        </div>

        <!-- Mint -->
        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Mint</label>
            <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                <option>P (Philadelphia)</option>
                <option>D (Denver)</option>
                <option>S (San Francisco)</option>
                <option>W (West Point)</option>
            </select>
        </div>

        <!-- Voice Search/Controls -->
        <button onclick="startVoiceSearch()" class="w-full bg-[#1e293b] text-blue-400 font-bold py-3 rounded-lg text-sm uppercase">
            🎤 Voice Input
        </button>
        <button onclick="runQuery()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg text-sm uppercase">
            Query Live AI
        </button>
    </div>

    <script>
        function runQuery() {
            console.log("Querying AI...");
        }

        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.start();
                recognition.onresult = (event) => {
                    console.log("Voice Input:", event.results[0][0].transcript);
                };
            } else {
                alert("Voice search not supported.");
            }
        }
    </script>
</body>
</html>
