<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous Numismatic Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0b0f17; color: #f0f4f8; }</style>
</head>
<body class="p-4 max-w-md mx-auto font-sans antialiased">

    <div class="text-center my-6 border-b border-gray-900 pb-4">
        <h1 class="text-3xl font-extrabold tracking-tight text-white">WhatCoin™</h1>
        <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-semibold">Autonomous AI Intelligence Suite</p>
    </div>

    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-amber-500/20 shadow-lg">
        <label class="block text-xs font-bold uppercase tracking-wider text-amber-400 mb-2">Gemini API Credentials</label>
        <input 
            id="api-key-input" 
            type="password" 
            placeholder="Enter API Key..." 
            class="w-full bg-[#182032] rounded-lg p-3 text-xs text-white placeholder-gray-500 border border-[#2e3b54] focus:outline-none focus:border-amber-500 transition-all font-mono"
        >
    </div>

    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-[#222c3f] shadow-2xl">
        <input id="search-input" type="text" placeholder="Enter Year, Mint Mark, Variety..." class="w-full bg-[#182032] rounded-lg p-3.5 mb-2 text-sm text-white placeholder-gray-500 border border-[#2e3b54]">
        <button id="search-btn" onclick="executeSearch()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-xs uppercase tracking-wider">Query Live AI Engine</button>
    </div>

    <div id="target-specimen-card" class="bg-[#111622] rounded-xl p-4 mb-4 border border-blue-500/20 shadow-lg hidden">
        <h3 id="target-coin-name" class="text-lg font-bold text-white">---</h3>
    </div>

    <div class="bg-[#152035] rounded-xl p-5 mb-4 border border-blue-400 text-center">
        <div id="display-value" class="text-5xl font-black text-white">$0.00</div>
    </div>

    <script type="importmap">
      { "imports": { "@google/gen-ai": "https://esm.run/@google/gen-ai" } }
    </script>
    <script type="module">
        import { GoogleGenAI } from '@google/gen-ai';
        window.GoogleGenAIInstance = GoogleGenAI;
    </script>

    <script>
        async function executeSearch() {
            const rawInput = document.getElementById('search-input').value.trim();
            const apiKey = document.getElementById('api-key-input').value.trim();
            
            if (!apiKey) { alert("Please enter your API key."); return; }

            const searchBtn = document.getElementById('search-btn');
            searchBtn.disabled = true;
            searchBtn.innerText = "Analyzing...";

            try {
                const ai = new window.GoogleGenAIInstance({ apiKey: apiKey });
                const model = ai.getGenerativeModel({ model: "gemini-3.5-flash" });

                const result = await model.generateContent({
                    contents: `Analyze coin: "${rawInput}". Return JSON only: {"name": "Example Coin", "price": 0.00}`,
                    generationConfig: { responseMimeType: "application/json" }
                });

                const data = JSON.parse(result.response.text());
                document.getElementById('target-coin-name').innerText = data.name;
                document.getElementById('display-value').innerText = `$${data.price.toFixed(2)}`;
                document.getElementById('target-specimen-card').classList.remove('hidden');
            } catch (error) {
                console.error("AI Error:", error);
                alert("AI Error. Ensure your API key is valid for gemini-3.5-flash and that your connection is secure.");
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerText = "Query Live AI Engine";
            }
        }
    </script>
</body>
</html>
