<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Numismatic Matrix Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Gold/Green inspired theme */
        body { 
            background: radial-gradient(circle at top, #0f170f, #000000); 
            min-height: 100vh; 
            color: #d1d5db; 
        }
        .glass-panel { 
            background: rgba(10, 15, 10, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(184, 153, 68, 0.2); 
        }
        select, input { 
            background-color: #050505 !important; 
            color: #fff !important; 
            border-color: rgba(184, 153, 68, 0.3) !important;
        }
        
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 15px rgba(184, 153, 68, 0.2); }
            50% { box-shadow: 0 0 30px rgba(184, 153, 68, 0.4); }
        }
        .animate-pulse-gold { animation: pulse-gold 2s infinite ease-in-out; }
    </style>
</head>
<body class="p-4 flex flex-col items-center font-sans antialiased">

    <div class="text-center my-8">
        <!-- Logo updated to remove border and fit cleanly -->
        <img src="logo.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-48 h-48 mx-auto object-contain mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-[#b89944] mt-1">Numismatic Matrix Lab</p>
    </div>

    <div class="glass-panel w-full max-w-sm p-6 rounded-3xl shadow-2xl space-y-4">
        <div>
            <label class="text-[9px] font-black text-[#b89944] uppercase tracking-widest ml-1">Year</label>
            <select id="year-select" class="w-full mt-1.5 rounded-xl p-4 text-sm font-bold shadow-inner border"></select>
        </div>

        <div>
            <label class="text-[9px] font-black text-[#b89944] uppercase tracking-widest ml-1">Denomination</label>
            <select id="denom-select" class="w-full mt-1.5 rounded-xl p-4 text-sm font-bold shadow-inner border">
                <option>Roosevelt Dime (1946-Present) (Modern 10¢)</option>
                <option>Mercury Dime (1916-1945) (Vintage 10¢)</option>
                <option>Barber Dime (1892-1916) (Antique 10¢)</option>
                <option>Seated Liberty Dime (1837-1891) (Antique 10¢)</option>
                <option>Lincoln Cent (1909-Present) (Common Penny)</option>
                <option>Indian Head Penny (1859-1909) (Old Penny)</option>
                <option>Jefferson Nickel (1938-Present) (Modern 5¢)</option>
                <option>Buffalo Nickel (1913-1938) (Classic 5¢)</option>
                <option>Shield Nickel (1866-1883) (Early 5¢)</option>
                <option>Washington Quarter (1932-Present) (Modern 25¢)</option>
                <option>Standing Liberty Quarter (1916-1930) (Vintage 25¢)</option>
                <option>Kennedy Half Dollar (1964-Present) (Modern 50¢)</option>
                <option>Walking Liberty Half Dollar (1916-1947) (Classic 50¢)</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-[#b89944] uppercase tracking-widest ml-1">Condition / Toning / Variety</label>
            <select id="condition-select" class="w-full mt-1.5 rounded-xl p-4 text-sm font-bold shadow-inner border">
                <option>Natural (Untoned)</option>
                <option>Bag Toning</option>
                <option>Rainbow Toning</option>
                <option>Artificial Toning</option>
                <option>Cull (Heavily Worn/Damaged)</option>
                <option>Broadstrike (Error)</option>
                <option>Cud (Die Break)</option>
                <option>Hairlines (Scratched)</option>
                <option>Slabbed (Certified)</option>
                <option>Whizzed (Polished)</option>
                <option>Bag Marks</option>
                <option>Body Bag (Grading Rejection)</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-[#b89944] uppercase tracking-widest ml-1">Mint Mark</label>
            <select id="mint-select" class="w-full mt-1.5 rounded-xl p-4 text-sm font-bold shadow-inner border">
                <option>None (Philadelphia)</option><option>P</option><option>D</option><option>S</option>
                <option>W</option><option>O</option><option>CC</option><option>C</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-[#b89944] uppercase tracking-widest ml-1">Visual Evidence</label>
            <input type="file" accept="image/*" capture="environment" class="w-full mt-1.5 rounded-xl p-4 text-sm font-bold shadow-inner border file:bg-[#103010] file:text-[#00ff00] file:border-0 file:rounded-lg file:px-3 file:py-1 cursor-pointer">
        </div>

        <button onclick="runQuery()" id="query-btn" class="w-full bg-gradient-to-r from-[#103010] to-[#0a200a] border border-[#b89944] text-[#b89944] font-black py-4 rounded-xl text-sm uppercase tracking-widest transition-all animate-pulse-gold">
            QUERY MARKET VALUATION
        </button>

        <div class="pt-4 mt-4 border-t border-[#b89944]/20">
            <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest ml-1">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste your API key here..." class="w-full mt-1.5 rounded-xl p-4 text-sm font-mono shadow-inner border">
        </div>

        <div id="result-display" class="hidden mt-6 p-4 border border-[#b89944]/50 bg-[#0a0a05]/50 rounded-xl text-center">
            <p class="text-[9px] font-black text-[#b89944] uppercase tracking-widest mb-1">Estimated Market Valuation</p>
            <div id="valuation-text" class="text-lg font-black text-white tracking-tight"></div>
        </div>
    </div>

    <script>
        const yearSelect = document.getElementById('year-select');
        for (let i = 2026; i >= 1800; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }

        async function runQuery() { 
            const apiKey = document.getElementById('api-key').value;
            const btn = document.getElementById('query-btn');
            const display = document.getElementById('result-display');
            const valText = document.getElementById('valuation-text');

            if(!apiKey) { alert("Please enter your API key."); return; }

            btn.innerText = "ANALYZING...";
            btn.classList.remove('animate-pulse-gold');
            btn.disabled = true;
            display.classList.add('hidden');
            
            const payload = {
                "contents": [{
                    "parts": [{
                        "text": `Act as a professional numismatist. Provide the current estimated market value in USD for a ${document.getElementById('year-select').value} ${document.getElementById('mint-select').value} ${document.getElementById('denom-select').value} described as: ${document.getElementById('condition-select').value}. Base your valuation on current PCGS market data. If no collector market exists, state 'Market value not yet established'.`
                    }]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429) {
                    throw new Error("Server is busy. Please wait 10 seconds before your next analysis.");
                }

                if (!response.ok) {
                    throw new Error(`API Status: ${response.status}`);
                }

                const data = await response.json();
                valText.innerText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No appraisal data returned.";
                display.classList.remove('hidden');
            } catch (err) {
                valText.innerText = err.message;
                display.classList.remove('hidden');
            } finally {
                btn.innerText = "QUERY MARKET VALUATION";
                btn.classList.add('animate-pulse-gold');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
