<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a2234, #0b0f17); min-height: 100vh; color: #e2e8f0; }
        .glass-panel { background: rgba(17, 22, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select, input { background-color: #0b0f17 !important; color: #fff !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center font-sans antialiased">

    <!-- Logo Section -->
    <div class="text-center my-8">
        <img src="dopehouselogo.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-32 h-32 mx-auto rounded-2xl shadow-[0_0_30px_rgba(96,165,250,0.3)] mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 mt-1">Autonomous AI Intelligence Suite</p>
    </div>

    <!-- Main Controller -->
    <div class="glass-panel w-full max-w-sm p-6 rounded-3xl shadow-2xl space-y-4">
        
        <!-- Year -->
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Year</label>
            <select class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>2026</option>
                <option>2025</option>
                <option>2024</option>
                <option>2020</option>
                <option>2010</option>
                <option>2000</option>
                <option>1990</option>
                <option>1980</option>
                <option>1970</option>
                <option>1960</option>
                <option>1950</option>
                <option>1940</option>
                <option>1930</option>
                <option>1920</option>
                <option>1910</option>
                <option>1900</option>
            </select>
        </div>

        <!-- Denomination -->
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Denomination</label>
            <select class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>Half Cent</option>
                <option>Large Cent</option>
                <option>Flying Eagle Cent</option>
                <option>Indian Head Cent</option>
                <option>Lincoln Cent</option>
                <option>Two Cent</option>
                <option>Three Cent</option>
                <option>Shield Nickel</option>
                <option>Liberty Head Nickel</option>
                <option>Buffalo Nickel</option>
                <option>Jefferson Nickel</option>
                <option>Half Dime</option>
                <option>Draped Bust Dime</option>
                <option>Seated Liberty Dime</option>
                <option>Barber Dime</option>
                <option>Mercury Dime</option>
                <option>Roosevelt Dime</option>
                <option>Twenty Cent Piece</option>
                <option>Quarter Dollar</option>
                <option>Half Dollar</option>
                <option>Dollar</option>
            </select>
        </div>

        <!-- Tone -->
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Tone (Aging)</label>
            <select class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>None / Natural</option>
                <option>Light Toning</option>
                <option>Target / Bullseye</option>
                <option>Rainbow Toning</option>
                <option>Peripheral Toning</option>
                <option>Golden Toning</option>
                <option>Album Toning</option>
                <option>Artificial / Cleaned</option>
            </select>
        </div>

        <!-- Mint -->
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Mint Mark</label>
            <select class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>P (Philadelphia)</option>
                <option>D (Denver)</option>
                <option>S (San Francisco)</option>
                <option>W (West Point)</option>
                <option>O (New Orleans)</option>
                <option>CC (Carson City)</option>
                <option>C (Charlotte)</option>
                <option>D (Dahlonega)</option>
            </select>
        </div>

        <!-- Proof Count -->
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Total Proof Count</label>
            <input type="text" readonly value="Data Pending Query" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner opacity-70">
        </div>

        <button onclick="startVoiceSearch()" class="w-full bg-[#1e293b] hover:bg-[#2a3754] text-blue-400 font-bold py-4 rounded-xl text-xs uppercase tracking-widest transition-all border border-blue-900/30">
            🎤 VOICE INPUT
        </button>

        <button onclick="runQuery()" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">
            QUERY LIVE AI
        </button>
    </div>

    <script>
        function runQuery() { console.log("Querying Proof data..."); }
        function startVoiceSearch() {
            const rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (rec) {
                const r = new rec();
                r.start();
                r.onresult = (e) => console.log("Input:", e.results[0][0].transcript);
            } else { alert("Voice search unsupported."); }
        }
    </script>
</body>
</html>
