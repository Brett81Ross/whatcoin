<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a2234, #0b0f17); min-height: 100vh; color: #e2e8f0; }
        .glass-panel { background: rgba(17, 22, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select, input { background-color: #0b0f17 !important; color: #fff !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center font-sans antialiased">

    <!-- Logo Section -->
    <div class="text-center my-8">
        <img src="dopehouselogo.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-32 h-32 mx-auto rounded-2xl shadow-[0_0_30px_rgba(96,165,250,0.3)] mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 mt-1">Autonomous AI Intelligence Suite</p>
    </div>

    <!-- Main Controller -->
    <div class="glass-panel w-full max-w-sm p-6 rounded-3xl shadow-2xl space-y-4">
        
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste your API key here..." class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-mono shadow-inner">
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Year</label>
            <select id="year-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner"></select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Denomination</label>
            <select id="denom-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>Lincoln Cent</option><option>Jefferson Nickel</option><option>Roosevelt Dime</option>
                <option>Quarter Dollar</option><option>Half Dollar</option><option>Dollar</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Tone (Aging)</label>
            <select id="tone-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>None / Natural</option><option>Light Toning</option><option>Rainbow Toning</option>
                <option>Artificial / Cleaned</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Mint Mark</label>
            <select id="mint-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>P (Philadelphia)</option><option>D (Denver)</option><option>S (San Francisco)</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Total Proof Count</label>
            <input type="text" id="proof-count" readonly value="Click Query to Load" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner opacity-70">
        </div>

        <button onclick="startVoiceSearch()" class="w-full bg-[#1e293b] hover:bg-[#2a3754] text-blue-400 font-bold py-4 rounded-xl text-xs uppercase tracking-widest transition-all border border-blue-900/30">
            🎤 VOICE INPUT
        </button>

        <button onclick="runQuery()" id="query-btn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">
            QUERY LIVE AI
        </button>
    </div>

    <script>
        // Populate years 1800-2028
        const yearSelect = document.getElementById('year-select');
        for (let i = 2028; i >= 1800; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }

        async function runQuery() { 
            const apiKey = document.getElementById('api-key').value;
            const btn = document.getElementById('query-btn');
            if(!apiKey) { alert("Please enter your API key."); return; }

            btn.innerText = "QUERYING...";
            const prompt = `Provide the total proof mintage count for a ${document.getElementById('year-select').value} ${document.getElementById('mint-select').value} ${document.getElementById('denom-select').value} with ${document.getElementById('tone-select').value} toning. Return only the number. If unknown, return 'N/A'.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                
                // Safe parsing check to avoid errors like in 1000037476.jpg
                const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Parsing Error";
                document.getElementById('proof-count').value = text;
            } catch (err) {
                alert("Query failed: " + err.message);
            } finally {
                btn.innerText = "QUERY LIVE AI";
            }
        }

        function startVoiceSearch() {
            const rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (rec) {
                const r = new rec();
                r.start();
                r.onresult = (e) => console.log("Input:", e.results[0][0].transcript);
            } else { alert("Voice search unsupported."); }
        }
    </script>
</body>
</html>
