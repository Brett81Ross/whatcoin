<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a2234, #0b0f17); min-height: 100vh; color: #e2e8f0; }
        .glass-panel { background: rgba(17, 22, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select, input { background-color: #0b0f17 !important; color: #fff !important; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
            50% { box-shadow: 0 0 30px rgba(37, 99, 235, 0.7); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s infinite ease-in-out; }
    </style>
</head>
<body class="p-4 flex flex-col items-center font-sans antialiased">

    <div class="text-center my-8">
        <img src="logo1.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-32 h-32 mx-auto rounded-2xl shadow-[0_0_30px_rgba(96,165,250,0.3)] mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 mt-1">Autonomous AI Intelligence Suite</p>
    </div>

    <div class="glass-panel w-full max-w-sm p-6 rounded-3xl shadow-2xl space-y-4">
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Year</label>
            <select id="year-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner"></select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Denomination</label>
            <select id="denom-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>Roosevelt Dime</option><option>Mercury Dime</option><option>Barber Dime</option><option>Seated Liberty Dime</option>
                <option>Lincoln Cent</option><option>Indian Head Penny</option>
                <option>Jefferson Nickel</option><option>Buffalo Nickel</option><option>Shield Nickel</option>
                <option>Washington Quarter</option><option>Standing Liberty Quarter</option>
                <option>Kennedy Half Dollar</option><option>Walking Liberty Half Dollar</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Condition / Toning / Variety</label>
            <select id="condition-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>Natural (Untoned)</option>
                <option>Bag Toning</option>
                <option>Rainbow Toning</option>
                <option>Artificial Toning</option>
                <option>Cull (Heavily Worn/Damaged)</option>
                <option>Broadstrike (Error)</option>
                <option>Cud (Die Break)</option>
                <option>Hairlines (Scratched)</option>
                <option>Slabbed (Certified)</option>
                <option>Whizzed (Polished)</option>
                <option>Bag Marks</option>
                <option>Body Bag (Grading Rejection)</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Mint Mark</label>
            <select id="mint-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>None (Philadelphia)</option><option>P</option><option>D</option><option>S</option>
                <option>W</option><option>O</option><option>CC</option><option>C</option>
            </select>
        </div>

        <button onclick="runQuery()" id="query-btn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest transition-all animate-pulse-glow">
            QUERY MARKET VALUATION
        </button>

        <!-- API Key moved to the bottom -->
        <div class="pt-4 mt-4 border-t border-white/5">
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste your API key here..." class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-mono shadow-inner">
        </div>

        <div id="result-display" class="hidden mt-6 p-4 border border-blue-500/30 bg-blue-900/20 rounded-xl text-center">
            <p class="text-[9px] font-black text-blue-300 uppercase tracking-widest mb-1">Estimated Market Valuation</p>
            <div id="valuation-text" class="text-lg font-black text-white tracking-tight"></div>
        </div>
    </div>

    <script>
        const yearSelect = document.getElementById('year-select');
        for (let i = 2026; i >= 1800; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }

        async function runQuery() { 
            const apiKey = document.getElementById('api-key').value;
            const btn = document.getElementById('query-btn');
            const display = document.getElementById('result-display');
            const valText = document.getElementById('valuation-text');

            if(!apiKey) { alert("Please enter your API key."); return; }

            btn.innerText = "ANALYZING...";
            btn.classList.remove('animate-pulse-glow');
            btn.disabled = true;
            display.classList.add('hidden');
            
            const payload = {
                "contents": [{
                    "parts": [{
                        "text": `Act as a professional numismatist. Provide the current estimated market value in USD for a ${document.getElementById('year-select').value} ${document.getElementById('mint-select').value} ${document.getElementById('denom-select').value} described as: ${document.getElementById('condition-select').value}. Base your valuation on current PCGS market data. If no collector market exists, state 'Market value not yet established'.`
                    }]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429) {
                    throw new Error("Server is busy. Please wait 10 seconds before your next analysis.");
                }

                if (!response.ok) {
                    throw new Error(`API Status: ${response.status}`);
                }

                const data = await response.json();
                valText.innerText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No appraisal data returned.";
                display.classList.remove('hidden');
            } catch (err) {
                valText.innerText = err.message;
                display.classList.remove('hidden');
            } finally {
                btn.innerText = "QUERY MARKET VALUATION";
                btn.classList.add('animate-pulse-glow');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
