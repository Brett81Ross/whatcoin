<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a2234, #0b0f17); min-height: 100vh; color: #e2e8f0; }
        .glass-panel { background: rgba(17, 22, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        select, input { background-color: #0b0f17 !important; color: #fff !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center font-sans antialiased">

    <div class="text-center my-8">
        <img src="logo1.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-32 h-32 mx-auto rounded-2xl shadow-[0_0_30px_rgba(96,165,250,0.3)] mb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-[10px] uppercase tracking-[0.2em] text-blue-400 mt-1">Autonomous AI Intelligence Suite</p>
    </div>

    <div class="glass-panel w-full max-w-sm p-6 rounded-3xl shadow-2xl space-y-4">
        
        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste your API key here..." class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-mono shadow-inner">
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Year</label>
            <select id="year-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner"></select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Currency Type / Denomination</label>
            <select id="denom-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <optgroup label="Coins">
                    <option>Half Cent</option><option>Large Cent</option><option>Small Cent</option>
                    <option>Two Cent</option><option>Three Cent</option><option>Shield Nickel</option>
                    <option>Liberty Nickel</option><option>Buffalo Nickel</option><option>Jefferson Nickel</option>
                    <option>Half Dime</option><option>Dime</option><option>Twenty Cent</option>
                    <option>Quarter</option><option>Half Dollar</option><option>Dollar</option>
                </optgroup>
                <optgroup label="Paper Currency">
                    <option>$1 Note</option><option>$2 Note</option><option>$5 Note</option>
                    <option>$10 Note</option><option>$20 Note</option><option>$50 Note</option>
                    <option>$100 Note</option><option>$500 Note</option><option>$1000+ Note</option>
                </optgroup>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Tone / Aging</label>
            <select id="tone-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>None / Natural</option><option>Red (Full Red)</option>
                <option>Yellow (Gold Tone)</option><option>Light Toning</option>
                <option>Rainbow Toning</option><option>Artificial / Cleaned</option>
            </select>
        </div>

        <div>
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest ml-1">Mint Mark</label>
            <select id="mint-select" class="w-full mt-1.5 border border-white/10 rounded-xl p-4 text-sm font-bold shadow-inner">
                <option>None (Philadelphia)</option><option>P (Philadelphia)</option>
                <option>D (Denver)</option><option>S (San Francisco)</option>
                <option>W (West Point)</option><option>O (New Orleans)</option>
                <option>CC (Carson City)</option><option>C (Charlotte)</option>
                <option>D (Dahlonega)</option>
            </select>
        </div>

        <button onclick="runQuery()" id="query-btn" class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-black py-4 rounded-xl text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all">
            QUERY MARKET VALUATION
        </button>
    </div>

    <script>
        const yearSelect = document.getElementById('year-select');
        for (let i = 2028; i >= 1800; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }

        async function runQuery() { 
            const apiKey = document.getElementById('api-key').value;
            const btn = document.getElementById('query-btn');
            if(!apiKey) { alert("Please enter your API key."); return; }

            btn.innerText = "EVALUATING...";
            
            // Modified prompt to explicitly request only the dollar amount
            const payload = {
                "contents": [{
                    "parts": [{
                        "text": `What is the estimated market value in USD for a ${document.getElementById('year-select').value} ${document.getElementById('mint-select').value} ${document.getElementById('denom-select').value} in ${document.getElementById('tone-select').value} condition? Respond ONLY with the numerical dollar amount or range (e.g., "$0.10 - $0.25"). Do not add conversational text.`
                    }]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const result = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No value found.";
                
                alert("Market Valuation: " + result.trim());
            } catch (err) {
                alert("Error: Query failed.");
            } finally {
                btn.innerText = "QUERY MARKET VALUATION";
            }
        }
    </script>
</body>
</html>
