<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Numismatic Matrix Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            min-height: 100vh; 
            color: #ffffff; 
        }
        .glass-panel { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
        }
        select, input { 
            background-color: #050505 !important; 
            color: #ffffff !important; 
            border: 1px solid #333333 !important;
            font-size: 1.1rem !important;
        }
        label { font-size: 0.8rem !important; }
    </style>
</head>
<body class="p-6 flex flex-col items-center font-sans antialiased">

    <div class="text-center my-8">
        <!-- Logo size increased to w-64 h-64 -->
        <img src="logo.png" alt="WhatCoin Logo" onerror="this.style.display='none';" class="w-64 h-64 mx-auto mb-6 rounded-3xl object-contain">
        <h1 class="text-4xl font-black tracking-tighter text-white">WhatCoin™</h1>
        <p class="text-sm uppercase tracking-[0.4em] text-[#666] mt-2">Numismatic Matrix Lab</p>
    </div>

    <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl space-y-6">
        <div>
            <label class="font-bold text-[#777] uppercase tracking-widest ml-1">Year</label>
            <select id="year-select" class="w-full mt-2 rounded-2xl p-5 font-bold"></select>
        </div>

        <div>
            <label class="font-bold text-[#777] uppercase tracking-widest ml-1">Denomination</label>
            <select id="denom-select" class="w-full mt-2 rounded-2xl p-5 font-bold">
                <option>Large Cent (1793–1857)</option>
                <option>Flying Eagle Cent (1856–1858)</option>
                <option>Indian Head Cent (1859–1909)</option>
                <option>Lincoln Cent (1909–Present)</option>
                <option>Two-Cent Piece (1864–1873)</option>
                <option>Three-Cent Silver (1851–1873)</option>
                <option>Three-Cent Nickel (1865–1889)</option>
                <option>Shield Nickel (1866–1883)</option>
                <option>Liberty Head Nickel (1883–1912)</option>
                <option>Buffalo Nickel (1913–1938)</option>
                <option>Jefferson Nickel (1938–Present)</option>
                <option>Half Dime (1792–1873)</option>
                <option>Bust Dime (1796–1837)</option>
                <option>Seated Liberty Dime (1837–1891)</option>
                <option>Barber Dime (1892–1916)</option>
                <option>Mercury Dime (1916–1945)</option>
                <option>Roosevelt Dime (1946–Present)</option>
                <option>Twenty-Cent Piece (1875–1878)</option>
                <option>Bust Quarter (1796–1838)</option>
                <option>Seated Liberty Quarter (1838–1891)</option>
                <option>Barber Quarter (1892–1916)</option>
                <option>Standing Liberty Quarter (1916–1930)</option>
                <option>Washington Quarter (1932–Present)</option>
                <option>Bust Half Dollar (1794–1839)</option>
                <option>Seated Liberty Half Dollar (1839–1891)</option>
                <option>Barber Half Dollar (1892–1915)</option>
                <option>Walking Liberty Half Dollar (1916–1947)</option>
                <option>Franklin Half Dollar (1948–1963)</option>
                <option>Kennedy Half Dollar (1964–Present)</option>
                <option>Flowing Hair Dollar (1794–1795)</option>
                <option>Draped Bust Dollar (1795–1804)</option>
                <option>Seated Liberty Dollar (1840–1873)</option>
                <option>Trade Dollar (1873–1885)</option>
                <option>Morgan Dollar (1878–1904, 1921)</option>
                <option>Peace Dollar (1921–1935, 2021–Present)</option>
                <option>Eisenhower Dollar (1971–1978)</option>
                <option>Susan B. Anthony Dollar (1979–1981, 1999)</option>
                <option>Sacagawea/Native American Dollar (2000–Present)</option>
                <option>American Innovation Dollar (2018–Present)</option>
            </select>
        </div>

        <div>
            <label class="font-bold text-[#777] uppercase tracking-widest ml-1">Condition / Toning / Variety</label>
            <select id="condition-select" class="w-full mt-2 rounded-2xl p-5 font-bold">
                <option>Natural (Untoned)</option>
                <option>Bag Toning</option>
                <option>Rainbow Toning</option>
                <option>Cull (Heavily Worn)</option>
                <option>Broadstrike (Error)</option>
                <option>Slabbed (Certified)</option>
            </select>
        </div>

        <div>
            <label class="font-bold text-[#777] uppercase tracking-widest ml-1">Mint Mark</label>
            <select id="mint-select" class="w-full mt-2 rounded-2xl p-5 font-bold">
                <option>None (Philadelphia)</option><option>P</option><option>D</option><option>S</option>
                <option>W</option><option>O</option>
            </select>
        </div>

        <div>
            <label class="font-bold text-[#777] uppercase tracking-widest ml-1">Visual Evidence</label>
            <input type="file" accept="image/*" capture="environment" class="w-full mt-2 rounded-2xl p-5 font-bold file:bg-[#333] file:text-white file:border-0 file:rounded-lg file:px-4 file:py-2">
        </div>

        <button onclick="runQuery()" id="query-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl text-lg uppercase tracking-widest transition-all">
            QUERY MARKET VALUATION
        </button>

        <div class="pt-6 mt-6 border-t border-[#1a1a1a]">
            <label class="font-bold text-[#444] uppercase tracking-widest ml-1">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Paste API key..." class="w-full mt-2 rounded-2xl p-5 font-mono">
        </div>

        <div id="result-display" class="hidden mt-8 p-6 border border-[#222] bg-[#050505] rounded-2xl text-center">
            <p class="text-xs font-black text-[#555] uppercase tracking-widest mb-2">Estimated Market Valuation</p>
            <div id="valuation-text" class="text-xl font-bold text-white tracking-tight"></div>
        </div>
    </div>

    <script>
        const yearSelect = document.getElementById('year-select');
        for (let i = 2026; i >= 1800; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }

        async function runQuery() { 
            const apiKey = document.getElementById('api-key').value;
            const btn = document.getElementById('query-btn');
            const display = document.getElementById('result-display');
            const valText = document.getElementById('valuation-text');

            if(!apiKey) { alert("Please enter your API key."); return; }

            btn.innerText = "ANALYZING...";
            btn.disabled = true;
            display.classList.add('hidden');
            
            const payload = {
                "contents": [{
                    "parts": [{
                        "text": `Act as a professional numismatist. Provide the current estimated market value in USD for a ${document.getElementById('year-select').value} ${document.getElementById('mint-select').value} ${document.getElementById('denom-select').value} described as: ${document.getElementById('condition-select').value}. Base your valuation on current PCGS market data. If no collector market exists, state 'Market value not yet established'.`
                    }]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429) {
                    throw new Error("Server is busy. Please wait 10 seconds.");
                }

                if (!response.ok) {
                    throw new Error(`API Status: ${response.status}`);
                }

                const data = await response.json();
                valText.innerText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No data.";
                display.classList.remove('hidden');
            } catch (err) {
                valText.innerText = err.message;
                display.classList.remove('hidden');
            } finally {
                btn.innerText = "QUERY MARKET VALUATION";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
