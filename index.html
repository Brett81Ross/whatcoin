<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous AI Intelligence Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f17; color: #e2e8f0; }
        .glass { background-color: #111622; border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto font-sans">

    <!-- Header -->
    <div class="text-center mb-6">
        <img src="logo5.png" alt="Logo" class="w-20 h-20 mx-auto mb-2 rounded-full">
        <h1 class="text-2xl font-black text-white">WhatCoin™</h1>
        <p class="text-xs text-blue-400 font-bold uppercase tracking-widest">Autonomous AI Intelligence Suite</p>
    </div>

    <!-- Credentials -->
    <div class="glass p-4 rounded-xl mb-4">
        <label class="text-[10px] font-bold text-gray-500 uppercase">Gemini API Credentials</label>
        <div class="flex items-center gap-2 mt-1">
            <input type="password" id="api-key" value="************************" class="flex-grow bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 text-sm font-mono text-gray-300">
            <button onclick="startVoiceSearch()" class="bg-[#1e293b] p-3 rounded-lg text-blue-400 hover:text-white transition-colors">
                🎤
            </button>
        </div>
    </div>

    <!-- Main Controls -->
    <div class="glass p-4 rounded-xl mb-4 space-y-4">
        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Denomination & Analysis</label>
            <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                <option>Cent (Penny)</option>
                <option>Tone (Toning Evaluation)</option>
            </select>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase">Year</label>
                <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                    <option>1960</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase">Mint Mark</label>
                <select class="w-full bg-[#0b0f17] border border-[#1e293b] rounded-lg p-3 mt-1 text-sm">
                    <option>P (Philadelphia)</option>
                </select>
            </div>
        </div>

        <div>
            <label class="text-[10px] font-bold text-gray-500 uppercase">Grade Scale Evaluation</label>
            <div class="bg-[#1e293b] p-2 rounded-lg text-blue-400 text-xs font-bold mt-1">MS-65 (Uncirculated)</div>
            <input type="range" class="w-full mt-3 accent-blue-600">
            <div class="flex justify-between text-[10px] text-gray-500 mt-1">
                <span>PO-1 (Poor)</span>
                <span>MS-70 (Uncirculated)</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 pt-2">
            <button class="bg-[#1e293b] text-amber-500 font-bold py-3 rounded-lg text-sm uppercase">Multipliers</button>
            <button onclick="runQuery()" class="bg-blue-600 text-white font-bold py-3 rounded-lg text-sm uppercase">Query Live AI</button>
        </div>
    </div>

    <!-- Error/Status Display -->
    <div id="error-box" class="glass border-red-900/50 p-4 rounded-xl mb-4 text-red-500 text-xs hidden">
        Evaluation parsing failed. Try clicking Query Live AI again.
    </div>

    <!-- Specification Display -->
    <div class="glass p-4 rounded-xl">
        <label class="text-[10px] font-bold text-gray-500 uppercase">Coin Specification</label>
        <div id="voice-result" class="text-white font-bold mt-1">1977 Lincoln Memorial Cent</div>
    </div>

    <script>
        function runQuery() {
            document.getElementById('error-box').classList.remove('hidden');
        }

        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice search is not supported in this browser.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('voice-result').innerText = transcript;
                console.log("Voice Input:", transcript);
            };

            recognition.start();
        }
    </script>
</body>
</html>
