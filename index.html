<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatCoin™ - Autonomous Numismatic Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>body { background-color: #0b0f17; color: #f0f4f8; }</style>
</head>
<body class="p-4 max-w-md mx-auto font-sans antialiased">

    <div class="text-center my-6 border-b border-gray-900 pb-4">
        <h1 class="text-3xl font-extrabold tracking-tight text-white">WhatCoin™</h1>
        <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-semibold">Autonomous AI Intelligence Suite v2.5</p>
    </div>

    <!-- API Credentials Container -->
    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-amber-500/20 shadow-lg">
        <label class="block text-xs font-bold uppercase tracking-wider text-amber-400 mb-2">Gemini API Credentials</label>
        <input 
            id="api-key-input" 
            type="password" 
            placeholder="Enter API Key (AIzaSy...)" 
            class="w-full bg-[#182032] rounded-lg p-3 text-xs text-white placeholder-gray-500 border border-[#2e3b54] focus:outline-none focus:border-amber-500 transition-all font-mono"
        >
    </div>

    <!-- Structured Parameter Controls -->
    <div class="bg-[#111622] rounded-xl p-4 mb-4 border border-[#222c3f] shadow-2xl space-y-4">
        
        <!-- 1. Year -->
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Year</label>
            <select id="year-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
            </select>
        </div>

        <!-- 2. Denomination -->
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Denomination</label>
            <select id="denom-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                <option value="1c">Cent (Penny)</option>
                <option value="5c">Nickel</option>
                <option value="10c">Dime</option>
                <option value="25c" selected>Quarter</option>
                <option value="50c">Half Dollar</option>
                <option value="11">Dollar Coin</option>
            </select>
        </div>

        <!-- 3. Tone (Refined per 1000037454_2.jpg and 1000037456_2.jpg specifications) -->
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Tone & Surface Authentication</label>
            <select id="tone-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                <option value="Untoned / Blast White">Untoned ("Blast White")</option>
                <option value="Natural Toning: Vibrant Rainbow/Crescent/Target (Settles in recesses, breaks gently around raised details)">Natural Toning: Rainbow/Crescent/Target</option>
                <option value="Natural Toning: Gold/Yellow Tones (Chemical bonding over decades)">Natural Toning: Gold / Yellow Tones</option>
                <option value="Natural Toning: Red/Magenta Tones (Retains color/depth under vertical halogen lighting)">Natural Toning: Red / Magenta Tones</option>
                <option value="Undesirable Toning (Dark/Splotchy/Environmentally Damaged)">Undesirable Toning: Dark/Splotchy/Damage</option>
                <option value="Artificial Toning: Altered Crayon Colors (Uniform bleeding, bullseye shapes, or floating surface film)">Artificial Toning: Counterfeit/Altered Colors (Reject)</option>
            </select>
        </div>

        <!-- 4. Mint Mark -->
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Mint Mark</label>
            <select id="mint-select" class="w-full bg-[#182032] rounded-lg p-3 text-sm text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                <option value="P (Philadelphia)">P (Philadelphia)</option>
                <option value="D (Denver)">D (Denver)</option>
                <option value="S (San Francisco)">S (San Francisco)</option>
                <option value="W (West Point)">W (West Point)</option>
                <option value="No Mint Mark">No Mint Mark</option>
            </select>
        </div>

        <!-- 5. Numismatic Profiler Dropdowns (Derived from 1000037458.jpg and 1000037461.jpg metrics) -->
        <div class="border-t border-gray-800 pt-3 space-y-3">
            <label class="block text-xs font-bold uppercase tracking-wider text-blue-400">Advanced Material Properties</label>
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1">Striking/Die State</label>
                    <select id="strike-select" class="w-full bg-[#182032] rounded-lg p-2 text-xs text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                        <option value="Standard Strike">Standard Strike</option>
                        <option value="Broadstrike Error (Struck without collar, design spread outward)">Broadstrike Error</option>
                        <option value="Cud Error (Raised area from broken chunk falling out of die)">Cud Die Error</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1">Surface Alteration</label>
                    <select id="surface-select" class="w-full bg-[#182032] rounded-lg p-2 text-xs text-white border border-[#2e3b54] focus:outline-none focus:border-blue-500">
                        <option value="Original Surfaces">Original Surfaces</option>
                        <option value="Bag Marks Present (Abrasions from contact in mint bags)">Bag Marks Present</option>
                        <option value="Whizzing Alteration (Polished/Mechanically brushed surface - Body Bag hazard)">Whizzed / Cleaned (Altered)</option>
                        <option value="Cull Piece (Heavily worn/damaged representative coin)">Cull / Heavily Damaged</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Condition Grade Map Input -->
        <div>
            <div class="flex justify-between items-center mb-1">
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500">Condition Numeric Grade</label>
                <span id="grade-badge" class="text-xs bg-blue-900/40 text-blue-400 px-2 py-0.5 rounded border border-blue-500/30 font-bold">MS-63 (Choice Uncirculated)</span>
            </div>
            <input 
                id="grade-slider" 
                type="range" 
                min="1" 
                max="70" 
                value="63" 
                class="w-full h-2 bg-[#182032] rounded-lg appearance-none cursor-pointer accent-blue-500 border border-[#2e3b54]"
                oninput="updateGradeLabel(this.value)"
            >
        </div>

        <!-- Action Matrix -->
        <div class="grid grid-cols-5 gap-2 pt-2">
            <button id="multiplier-btn" onclick="fetchMultipliers()" class="col-span-2 bg-[#1b253b] hover:bg-[#23304d] text-amber-400 border border-amber-500/30 font-bold py-3 rounded-lg text-xs uppercase tracking-wider transition-colors">
                Multipliers
            </button>
            <button id="search-btn" onclick="executeSearch()" class="col-span-3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg text-xs uppercase tracking-wider transition-colors">
                Query Live AI
            </button>
        </div>
    </div>

    <!-- Status & Error Output Panel -->
    <div id="status-card" class="bg-[#221616] rounded-xl p-4 mb-4 border border-red-500/30 hidden">
        <p id="status-content" class="text-xs text-red-400 font-medium font-mono whitespace-pre-wrap"></p>
    </div>

    <!-- Defect Multiplier Diagnostic Output -->
    <div id="multiplier-card" class="bg-[#111622] rounded-xl p-4 mb-4 border border-amber-500/20 shadow-lg hidden">
        <h4 class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-2">Target Defect Anomalies & Varieties</h4>
        <p id="multiplier-content" class="text-xs text-gray-300 leading-relaxed whitespace-pre-line"></p>
    </div>

    <!-- Metric Display Panels -->
    <div id="target-specimen-card" class="bg-[#111622] rounded-xl p-4 mb-4 border border-blue-500/20 shadow-lg hidden space-y-2">
        <div>
            <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Coin Specification</label>
            <h3 id="target-coin-name" class="text-base font-bold text-white">---</h3>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-1 border-t border-gray-800">
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Mintage Location</label>
                <div id="display-location" class="text-xs font-semibold text-blue-400">---</div>
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold tracking-wider text-gray-500">Total Mintage</label>
                <div id="display-mintage" class="text-xs font-semibold text-blue-400">---</div>
            </div>
        </div>
    </div>

    <!-- Live Appraisal Valuation Panel -->
    <div class="bg-[#152035] rounded-xl p-5 mb-4 border border-blue-400 text-center shadow-inner">
        <div id="display-value" class="text-5xl font-black text-white">$0.00</div>
    </div>

    <script type="importmap">
      { "imports": { "@google/genai": "https://esm.run/@google/genai" } }
    </script>
    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        window.GoogleGenAIInstance = GoogleGenAI;
    </script>

    <script>
        let activeSearchId = 0;
        let activeMultiplierId = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const yearSelect = document.getElementById('year-select');
            let optionsStr = '';
            for(let y = 2026; y >= 1800; y--) {
                optionsStr += `<option value="${y}">${y}</option>`;
            }
            yearSelect.innerHTML = optionsStr;
            yearSelect.value = "1972";
            document.getElementById('mint-select').value = "S (San Francisco)";
        });

        function updateGradeLabel(val) {
            const badge = document.getElementById('grade-badge');
            const num = parseInt(val);
            let label = "Circulated";
            
            if (num >= 65) label = `MS-${num} (Gem Uncirculated)`;
            else if (num >= 60) label = `MS-${num} (Uncirculated)`;
            else if (num >= 50) label = `AU-${num} (About Uncirculated)`;
            else if (num >= 40) label = `EF-${num} (Extremely Fine)`;
            else if (num >= 20) label = `VF-${num} (Very Fine)`;
            else if (num >= 12) label = `F-${num} (Fine)`;
            else if (num >= 4) label = `G-${num} (Good)`;
            else label = `PO-${num} (Poor)`;
            
            badge.innerText = label;
        }

        function getCompiledSelection() {
            return {
                denomination: document.getElementById('denom-select').options[document.getElementById('denom-select').selectedIndex].text,
                year: document.getElementById('year-select').value,
                mint: document.getElementById('mint-select').value,
                tone: document.getElementById('tone-select').value,
                strike: document.getElementById('strike-select').value,
                surface: document.getElementById('surface-select').value,
                grade: document.getElementById('grade-slider').value
            };
        }

        function showError(msg) {
            const card = document.getElementById('status-card');
            const content = document.getElementById('status-content');
            if (msg) {
                content.innerText = msg;
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        }

        async function fetchDirectRestFallback(apiKey, prompt, schemaConfig = null) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            if (schemaConfig) {
                payload.generationConfig = {
                    responseMimeType: "application/json",
                    responseSchema: schemaConfig
                };
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `HTTP Request failed with status code ${response.status}`);
            }

            const resData = await response.json();
            return resData.candidates[0].content.parts[0].text;
        }

        async function fetchMultipliers() {
            showError(null);
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) { showError("Error: Please enter your Gemini API key first."); return; }

            activeMultiplierId++;
            const currentId = activeMultiplierId;

            const config = getCompiledSelection();
            const multiplierBtn = document.getElementById('multiplier-btn');
            const targetDisplay = document.getElementById('multiplier-card');
            const targetText = document.getElementById('multiplier-content');

            multiplierBtn.disabled = true;
            multiplierBtn.innerText = "...";
            targetDisplay.classList.remove('hidden');
            targetText.innerText = "Querying varieties and toning factors database...";

            const promptText = `Identify well-known varieties, key dates, errors, and physical defect multipliers for a ${config.year} ${config.mint} ${config.denomination}. 
            Surface Toning: ${config.tone}. 
            Striking Profile: ${config.strike}. 
            Surface Features: ${config.surface}. 
            Provide a clean bulleted explanation breaking down how these expert factors modify the overall valuation baseline.`;

            try {
                let textResult = "";
                try {
                    const ai = new window.GoogleGenAIInstance({ apiKey: apiKey });
                    const response = await ai.models.generateContent({
                        model: "gemini-2.5-flash",
                        contents: promptText
                    });
                    textResult = response.text;
                } catch (sdkError) {
                    console.warn("SDK layer rejected key scheme. Activating REST architecture fallback...", sdkError);
                    textResult = await fetchDirectRestFallback(apiKey, promptText);
                }
                
                if (currentId !== activeMultiplierId) return;
                targetText.innerText = textResult;
            } catch (error) {
                console.error(error);
                if (currentId === activeMultiplierId) {
                    showError(`Authentication/API Error: ${error.message || error}`);
                }
            } finally {
                if (currentId === activeMultiplierId) {
                    multiplierBtn.disabled = false;
                    multiplierBtn.innerText = "Multipliers";
                }
            }
        }

        async function executeSearch() {
            showError(null);
            const apiKey = document.getElementById('api-key-input').value.trim();
            if (!apiKey) { showError("Error: Please enter your Gemini API key first."); return; }

            activeSearchId++;
            const currentId = activeSearchId;

            const config = getCompiledSelection();
            const searchBtn = document.getElementById('search-btn');
            searchBtn.disabled = true;
            searchBtn.innerText = "Analyzing...";

            let sheldonNotation = `Grade ${config.grade}/70`;
            const numGrade = parseInt(config.grade);
            if (numGrade >= 60) sheldonNotation = `Mint State Uncirculated MS-${numGrade}`;
            else if (numGrade >= 50) sheldonNotation = `About Uncirculated AU-${numGrade}`;
            else if (numGrade >= 40) sheldonNotation = `Extremely Fine EF-${numGrade}`;
            else if (numGrade >= 20) sheldonNotation = `Very Fine VF-${numGrade}`;

            const promptText = `Analyze standard market transaction values for this configuration: 
            Denomination: ${config.denomination}, 
            Year: ${config.year}, 
            Mint Mark: ${config.mint}, 
            Condition: ${sheldonNotation}, 
            Toning Profile: ${config.tone}, 
            Strike Variations: ${config.strike}, 
            Surface Profile: ${config.surface}. 
            Calculate strict pricing adjustments based on the parameters (e.g., provide high premiums for genuine errors or exquisite natural toning; apply dramatic value reductions, zero-out, or label as a potential ungradable slab reject if 'Whizzing' or 'Artificial Toning' modifications are highlighted).`;
            
            const strictSchema = {
                type: "OBJECT",
                properties: {
                    name: { type: "STRING" },
                    price: { type: "NUMBER" },
                    mintage_location: { type: "STRING" },
                    mintage_count: { type: "STRING" }
                },
                required: ["name", "price", "mintage_location", "mintage_count"]
            };

            try {
                let rawJsonText = "";
                try {
                    const ai = new window.GoogleGenAIInstance({ apiKey: apiKey });
                    const response = await ai.models.generateContent({
                        model: "gemini-2.5-flash",
                        contents: promptText,
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: strictSchema
                        }
                    });
                    rawJsonText = response.text;
                } catch (sdkError) {
                    console.warn("SDK initialization bypass. Transitioning directly to target endpoint...", sdkError);
                    rawJsonText = await fetchDirectRestFallback(apiKey, promptText, strictSchema);
                }

                if (currentId !== activeSearchId) return;

                const data = JSON.parse(rawJsonText.trim());
                
                document.getElementById('target-coin-name').innerText = data.name;
                document.getElementById('display-location').innerText = data.mintage_location || "Unknown";
                document.getElementById('display-mintage').innerText = data.mintage_count || "Unknown";
                
                const finalPrice = typeof data.price === 'number' ? data.price : parseFloat(data.price) || 0.00;
                document.getElementById('display-value').innerText = `$${finalPrice.toFixed(2)}`;
                
                document.getElementById('target-specimen-card').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                if (currentId === activeSearchId) {
                    showError(`Authentication/API Error: ${error.message || error}`);
                }
            } finally {
                if (currentId === activeSearchId) {
                    searchBtn.disabled = false;
                    searchBtn.innerText = "Query Live AI";
                }
            }
        }
    </script>
</body>
</html>
